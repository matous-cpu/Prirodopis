<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Hravý přírodopis 7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; color: #333; }
        
        header { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        
        h2 { color: #27ae60; font-size: 2em; margin-bottom: 20px; border-bottom: 3px solid #2ecc71; padding-bottom: 10px; }
        h3 { color: #2ecc71; margin: 25px 0 15px 0; font-size: 1.5em; }
        
        p { line-height: 1.7; margin-bottom: 15px; font-size: 1.05em; }
        
        ul, ol { margin-bottom: 20px; padding-left: 20px; }
        li { margin-bottom: 10px; line-height: 1.6; }
        li strong { color: #27ae60; }
        
        .image-placeholder { background: #e8f5e9; height: 300px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 5em; margin-bottom: 20px; border: 2px dashed #2ecc71; }
        
        .back-link { display: inline-block; margin-top: 30px; color: #27ae60; text-decoration: none; font-weight: bold; transition: color 0.3s; }
        .back-link:hover { color: #2ecc71; text-decoration: underline; }
        
        footer { text-align: center; padding: 20px; color: #666; margin-top: 50px; }
        
        .highlight { background: #e8f5e9; padding: 20px; border-left: 5px solid #2ecc71; border-radius: 5px; margin: 20px 0; }
    </style>
</head>
<body>
    <header>
        <h1>{{ICON}} {{TITLE}} {{ICON}}</h1>
        <p>{{SUBTITLE}}</p>
    </header>

    <div class="container">
        <a href="index.html" class="back-link">← Zpět na hlavní stránku</a>
        
        <div class="image-placeholder">{{ICON}}</div>

        {{CONTENT}}

        <a href="index.html" class="back-link">← Zpět na hlavní stránku</a>
    </div>

    <footer>
        <p>&copy; 2026 Hravý přírodopis 7 - Interaktivní učebnice</p>
    </footer>
</body>
</html>
