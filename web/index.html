<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hravý Portál - Vzdělávání</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #333; }
        
        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: 3em; color: #2c3e50; margin-bottom: 10px; }
        header p { font-size: 1.2em; color: #7f8c8d; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 900px; width: 90%; }
        
        .card { background: white; border-radius: 15px; padding: 40px; text-align: center; text-decoration: none; color: inherit; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: all 0.3s; border: 1px solid #eee; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-color: #3498db; }
        
        .card .icon { font-size: 4em; margin-bottom: 20px; display: block; }
        .card h2 { font-size: 1.8em; margin-bottom: 15px; color: #2c3e50; }
        .card p { color: #7f8c8d; line-height: 1.5; }
        
        .card.biologie { border-bottom: 8px solid #27ae60; }
        .card.history { border-bottom: 8px solid #e67e22; }
        
        .card.history { filter: grayscale(0.5); opacity: 0.8; cursor: not-allowed; }
        .card.history:hover { transform: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-color: #eee; }

        footer { margin-top: 60px; color: #95a5a6; font-size: 0.9em; }
    </style>
</head>
<body>
    <header>
        <h1>🌟 Hravý Portál 🌟</h1>
        <p>Interaktivní vzdělávací prostředí pro studenty</p>
    </header>

    <div class="grid">
        <a href="biologie/index.html" class="card biologie">
            <span class="icon">🌿</span>
            <h2>Biologie</h2>
            <p>Objevte svět rostlin a živočichů. Interaktivní učebnice a testy pro 9. ročník.</p>
        </a>

        <div class="card history">
            <span class="icon">📜</span>
            <h2>Historie</h2>
            <p>Brzy k dispozici. Cesta časem od pravěku po moderní dějiny.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hravý Portál - Projekt interaktivního vzdělávání</p>
    </footer>
</body>
</html>
