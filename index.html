<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hravý přírodopis 7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
        header { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        main { max-width: 1200px; margin: 0 auto; }
        .tema-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .tema-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s; }
        .tema-card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.15); }
        .tema-card .icon { font-size: 3em; margin-bottom: 10px; }
        .tema-card h3 { color: #27ae60; margin: 10px 0; }
        .tema-card button { width: 100%; background: #2ecc71; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        .tema-card button:hover { background: #27ae60; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-content h2 { color: #27ae60; margin-bottom: 15px; }
        .popis-text { line-height: 1.6; color: #333; margin: 15px 0; font-size: 0.95em; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #aaa; }
        .close:hover { color: black; }
        
        .test-question { background: #f9f9f9; padding: 15px; border-left: 4px solid #2ecc71; margin: 15px 0; }
        .test-question strong { display: block; margin-bottom: 10px; }
        .test-options label { display: block; margin: 8px 0; cursor: pointer; }
        .test-options input { margin-right: 8px; cursor: pointer; }
        .feedback { margin-top: 10px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
        
        h2.section-title { grid-column: 1/-1; color: #27ae60; margin-top: 30px; font-size: 1.8em; }
        footer { text-align: center; padding: 20px; color: #666; margin-top: 50px; }
    </style>
</head>
<body>
    <header>
        <h1>🌿 Hravý přírodopis 7 🐾</h1>
        <p>Interaktivní učebnice - Klikni na téma a absolvuj test!</p>
    </header>

    <main>
        <div class="tema-grid" id="temaGrid"></div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hravý přírodopis 7 - Interaktivní učebnice</p>
    </footer>

    <script>
        const data = {
            strunatci: [
                {
                    name: "Ryby",
                    icon: "🐠",
                    popis: "Ryby jsou nejstarší a druhově nejpočetnější skupinou obratlovců na Zemi. Patří mezi strunatce (Chordata), jsou to obratlovci (Vertebrata). Mají kostnatou nebo chrupavčitou kostru, hlava je pevně spojena s trupem – ryby nemají krk. Dýchají](#)*
