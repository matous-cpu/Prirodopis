<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Můj přírodopis — 7. třída</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 680px; margin: 0 auto; }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a18;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      border: 0.5px solid rgba(0,0,0,0.1);
    }

    .stat-label { font-size: 12px; color: #888780; margin-bottom: 2px; }
    .stat-val { font-size: 20px; font-weight: 500; }

    .add-form {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-row.full { grid-template-columns: 1fr; }

    label {
      font-size: 12px;
      color: #888780;
      display: block;
      margin-bottom: 4px;
    }

    input[type=text], textarea, select {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      padding: 8px 10px;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      background: #fafaf8;
      color: #1a1a18;
      outline: none;
    }

    input[type=text]:focus, textarea:focus, select:focus {
      border-color: rgba(0,0,0,0.35);
      background: #fff;
    }

    textarea { height: 70px; resize: vertical; }

    .btn-add {
      margin-top: 8px;
      font-size: 14px;
      padding: 0 16px;
      height: 36px;
      cursor: pointer;
      border-radius: 8px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: #fff;
      color: #1a1a18;
      font-family: inherit;
    }

    .btn-add:hover { background: #f5f4f0; }
    .btn-add:active { transform: scale(0.98); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .filter-btn {
      font-size: 12px;
      padding: 4px 12px;
      height: 28px;
      cursor: pointer;
      border-radius: 20px;
      border: 0.5px solid rgba(0,0,0,0.2);
      background: transparent;
      color: #888780;
      font-family: inherit;
    }

    .filter-btn:hover { background: #eee; }

    .filter-btn.active {
      background: #e6f1fb;
      color: #0c447c;
      border-color: #85b7eb;
    }

    .cards { display: grid; gap: 12px; }

    .card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .card-title { font-size: 15px; font-weight: 500; color: #1a1a18; }

    .card-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge-zivocich { background: #e1f5ee; color: #085041; }
    .badge-rostlina { background: #eaf3de; color: #27500a; }
    .badge-ekologie { background: #e6f1fb; color: #0c447c; }
    .badge-jine     { background: #f1efe8; color: #444441; }

    .card-date { font-size: 11px; color: #aaa; }

    .card-body {
      font-size: 14px;
      color: #5f5e5a;
      line-height: 1.6;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      padding: 0;
    }

    .del-btn:hover { color: #e24b4a; }

    .learned-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #888780;
      cursor: pointer;
      margin-top: 8px;
    }

    .learned-toggle input { cursor: pointer; }

    .card.learned { opacity: 0.5; }
    .card.learned .card-title { text-decoration: line-through; }

    .empty {
      text-align: center;
      padding: 2rem;
      color: #aaa;
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Můj přírodopis — 7. třída</h1>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Celkem záznamů</div>
        <div class="stat-val" id="total">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Naučeno</div>
        <div class="stat-val" id="learned-count" style="color:#1D9E75;">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Zbývá</div>
        <div class="stat-val" id="remaining-count" style="color:#7F77DD;">0</div>
      </div>
    </div>

    <div class="add-form">
      <div class="form-row">
        <div>
          <label>Název / pojem</label>
          <input type="text" id="inp-title" placeholder="např. Kapr obecný">
        </div>
        <div>
          <label>Kategorie</label>
          <select id="inp-cat">
            <option value="zivocich">Živočich</option>
            <option value="rostlina">Rostlina</option>
            <option value="ekologie">Ekologie</option>
            <option value="jine">Jiné</option>
          </select>
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label>Co ses o tom naučil/a (poznámka)</label>
          <textarea id="inp-note" placeholder="např. Kostnatá ryba, žije ve sladké vodě, má ploutve..."></textarea>
        </div>
      </div>
      <button class="btn-add" onclick="addCard()">+ Přidat záznam</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="vse" onclick="setFilter(this)">Vše</button>
      <button class="filter-btn" data-filter="zivocich" onclick="setFilter(this)">Živočichové</button>
      <button class="filter-btn" data-filter="rostlina" onclick="setFilter(this)">Rostliny</button>
      <button class="filter-btn" data-filter="ekologie" onclick="setFilter(this)">Ekologie</button>
      <button class="filter-btn" data-filter="jine" onclick="setFilter(this)">Jiné</button>
      <button class="filter-btn" data-filter="nauceno" onclick="setFilter(this)">Naučeno</button>
    </div>

    <div class="cards" id="cards-container">
      <div class="empty" id="empty-msg">Zatím žádný záznam. Přidej první pojem!</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'prirodopis_records';
    let records = [];
    let activeFilter = 'vse';

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) records = JSON.parse(raw);
      } catch(e) { records = []; }
      render();
    }

    function save() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch(e) {}
    }

    function addCard() {
      const title = document.getElementById('inp-title').value.trim();
      const note = document.getElementById('inp-note').value.trim();
      const cat = document.getElementById('inp-cat').value;
      if (!title) { document.getElementById('inp-title').focus(); return; }
      const now = new Date();
      const date = now.getDate() + '. ' + (now.getMonth()+1) + '. ' + now.getFullYear();
      records.unshift({ id: Date.now(), title, note, cat, date, learned: false });
      save();
      document.getElementById('inp-title').value = '';
      document.getElementById('inp-note').value = '';
      render();
    }

    function deleteCard(id) {
      records = records.filter(r => r.id !== id);
      save();
      render();
    }

    function toggleLearned(id) {
      const rec = records.find(r => r.id === id);
      if (rec) rec.learned = !rec.learned;
      save();
      render();
    }

    function setFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    }

    const catLabel = { zivocich: 'Živočich', rostlina: 'Rostlina', ekologie: 'Ekologie', jine: 'Jiné' };

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      const total = records.length;
      const learnedN = records.filter(r => r.learned).length;
      document.getElementById('total').textContent = total;
      document.getElementById('learned-count').textContent = learnedN;
      document.getElementById('remaining-count').textContent = total - learnedN;

      let filtered = records;
      if (activeFilter === 'nauceno') filtered = records.filter(r => r.learned);
      else if (activeFilter !== 'vse') filtered = records.filter(r => r.cat === activeFilter);

      const container = document.getElementById('cards-container');
      const empty = document.getElementById('empty-msg');

      container.querySelectorAll('.card').forEach(c => c.remove());

      if (filtered.length === 0) {
        empty.style.display = 'block';
        empty.textContent = records.length === 0
          ? 'Zatím žádný záznam. Přidej první pojem!'
          : 'V této kategorii nic není.';
        return;
      }

      empty.style.display = 'none';

      filtered.forEach(rec => {
        const div = document.createElement('div');
        div.className = 'card' + (rec.learned ? ' learned' : '');
        div.innerHTML = `
          <div class="card-top">
            <div class="card-title">${esc(rec.title)}</div>
            <button class="del-btn" onclick="deleteCard(${rec.id})" title="Smazat">×</button>
          </div>
          <div class="card-meta">
            <span class="badge badge-${rec.cat}">${catLabel[rec.cat]}</span>
            <span class="card-date">${rec.date}</span>
          </div>
          ${rec.note ? `<p class="card-body">${esc(rec.note)}</p>` : ''}
          <label class="learned-toggle">
            <input type="checkbox" ${rec.learned ? 'checked' : ''} onchange="toggleLearned(${rec.id})">
            Naučeno
          </label>
        `;
        container.appendChild(div);
      });
    }

    load();
  </script>
</body>
</html>
