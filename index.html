<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hravý přírodopis 7 - Interaktivní učebnice</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; }
        header { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; padding: 30px; text-align: center; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; }
        main { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .tema-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 30px 0; }
        .tema-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s ease; }
        .tema-card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.15); }
        .tema-card h3 { color: #27ae60; margin-bottom: 10px; }
        .tema-card .icon { font-size: 3em; margin-bottom: 10px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal.show { display: block; }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 30px; border: 1px solid #888; border-radius: 10px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        .test-container { margin-top: 20px; }
        .test-question { background: #f9f9f9; padding: 15px; border-left: 4px solid #2ecc71; margin: 10px 0; }
        .test-options { margin: 10px 0; }
        .test-options label { display: block; margin: 8px 0; cursor: pointer; }
        .test-options input[type="radio"] { margin-right: 10px; }
        button { background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:hover { background: #27ae60; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        footer { text-align: center; padding: 20px; color: #666; }
        h2 { grid-column: 1/-1; color: #27ae60; margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <h1>🌿 Hravý přírodopis 7 🐾</h1>
        <p>Interaktivní učebnice - Klikni na téma, čti o něm a absolvuj test!</p>
    </header>

    <main>
        <section class="tema-grid" id="temaGrid"></section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hravý přírodopis 7 - Interaktivní učebnice</p>
    </footer>

    <script>
        const data = {
            strunatci: [
                {
                    name: "Ryby",
                    icon: "🐠",
                    popis: "Ryby jsou vodní obratlovci se žábrami. Mají tělo pokryté šupinami a teplotu těla závislou na okolí. Respirují pomocí žaber a rozmnožují se kladením jiker.",
                    test: [
                        { q: "Jakou teplotu mají ryby?", options: ["Stálou", "Závislou na okolí", "Vždy 37°C", "Závislou na hloubce"], answer: 1 },
                        { q: "Čím respirují ryby?", options: ["Plícemi", "Žábrami", "Kůží", "Trachejemi"], answer: 1 },
                        { q: "Čím je pokryto tělo ryby?", options: ["Kůží", "Srstí", "Šupinami", "Peřím"], answer: 2 }
                    ]
                },
                {
                    name: "Obojživelníci",
                    icon: "🐸",
                    popis: "Obojživelníci jsou obratlovci, kteří žijí jak ve vodě, tak na souši. Respirují plícemi a částečně kůží. Mají znáhodilou teplotu těla. Příklady: žáby, tritonové.",
                    test: [
                        { q: "Kde žijí obojživelníci?", options: ["Jen ve vodě", "Jen na souši", "Ve vodě a na souši", "Jen pod zemí"], answer: 2 },
                        { q: "Jak respirují obojživelníci?", options: ["Jen plícemi", "Jen kůží", "Plícemi a částečně kůží", "Jen žábrami"], answer: 2 },
                        { q: "Jakou teplotu mají obojživelníci?", options: ["Stálou", "Znáhodilou", "Nižší než savci", "Vyšší než ptáci"], answer: 1 }
                    ]
                },
                {
                    name: "Plazi",
                    icon: "🐍",
                    popis: "Plazi jsou obratlovci se suchým tělem pokrytým rohovou pokožkou. Respirují jen plícemi. Mají znáhodilou teplotu těla. Příklady: hadi, ještěři, želvy.",
                    test: [
                        { q: "Čím je pokryto tělo plaza?", options: ["Šupinami", "Rohovou pokožkou", "Peřím", "Srstí"], answer: 1 },
                        { q: "Jakou teplotu mají plazi?", options: ["Stálou", "Znáhodilou", "Vyšší než obojživelníci", "Nižší než ryby"], answer: 1 },
                        { q: "Příklad plaza je:", options: ["Žába", "Had", "Ptáče", "Ryba"], answer: 1 }
                    ]
                },
                {
                    name: "Ptáci",
                    icon: "🦅",
                    popis: "Ptáci jsou obratlovci se stálou teplotou těla. Mají tělo pokryté peřím a přední končetiny p��eměněné v křídla. Respirují plícemi. Jsou vejcírodí.",
                    test: [
                        { q: "Jakou teplotu mají ptáci?", options: ["Nižší než savci", "Stálou", "Znáhodilou", "Závislou na věku"], answer: 1 },
                        { q: "Čím je pokryto tělo ptáka?", options: ["Šupinami", "Srstí", "Peřím", "Kůží"], answer: 2 },
                        { q: "Jak se rozmnožují ptáci?", options: ["Živými mláďaty", "Kladením vajec", "Pomocí spor", "Pučením"], answer: 1 }
                    ]
                },
                {
                    name: "Savci",
                    icon: "🦁",
                    popis: "Savci jsou obratlovci se stálou teplotou těla a tělem pokrytým srstí. Mají mléčné žlázy pro živení mláďat. Respirují plícemi. Jsou živorodí.",
                    test: [
                        { q: "Jakou teplotu mají savci?", options: ["Znáhodilou", "Stálou", "Nižší než ptáci", "Vyšší než ptáci"], answer: 1 },
                        { q: "Čím je pokryto tělo savce?", options: ["Peřím", "Šupinami", "Srstí", "Rohovou pokožkou"], answer: 2 },
                        { q: "Jak se rozmnožují savci?", options: ["Kladením vajec", "Pomocí spor", "Živými mláďaty živenými mlékem", "Pučením"], answer: 2 }
                    ]
                }
            ],
            botanika: [
                {
                    name: "Mechorosty",
                    icon: "🌱",
                    popis: "Mechorosty jsou jednoduchá výtrusná rostlina bez pravého kořene a cévnatiny. Žijí na vlhkých místech. Nemají květy. Rozmnožují se výtrusy.",
                    test: [
                        { q: "Co chybí mechům?", options: ["Listy", "Pravý kořen a cévy", "Třída", "Vůně"], answer: 1 },
                        { q: "Jak se rozmnožují mechy?", options: ["Semeny", "Výtrusy", "Cibulkami", "Řízky"], answer: 1 },
                        { q: "Kde žijí mechy?", options: ["Na suchých místech", "Na vlhkých místech", "Jen pod vodou", "Jen v pouštích"], answer: 1 }
                    ]
                },
                {
                    name: "Kapraďorosty",
                    icon: "🌿",
                    popis: "Kapraďorosty jsou výtrusná rostlina s prvními pravými kořeny a cévami. Mají peřité listy. Nemají květy. Rozmnožují se výtrusy.",
                    test: [
                        { q: "Co je charakteristické pro kapraďorosty?", options: ["Mají květy", "Mají peřité listy", "Nemají kořeny", "Jsou jednoletky"], answer: 1 },
                        { q: "Jak se rozmnožují kapraďorosty?", options: ["Semeny", "Výtrusy", "Cibulkami", "Hlízami"], answer: 1 },
                        { q: "Jakou strukturu mají kapraďorosty?", options: ["Bez kořenů", "S pravými kořeny a cévami", "Jen s kůrou", "Bez vody"], answer: 1 }
                    ]
                },
                {
                    name: "Nahosemenné rostliny",
                    icon: "🌲",
                    popis: "Nahosemenné rostliny mají semena vystavená bez ochranného obalu. Patří mezi ně jehličnany (smrk, borovice). Semena zrají v šiškách.",
                    test: [
                        { q: "Co je charakteristické pro nahosemenné rostliny?", options: ["Mají květy", "Semena bez ochranného obalu", "Semena v semenících", "Pouze v tropech"], answer: 1 },
                        { q: "Příklad nahosemenné rostliny je:", options: ["Jablko", "Smrk", "Tulipán", "Jahoda"], answer: 1 },
                        { q: "Kde zrají semena jehličnanů?", options: ["V květech", "V šiškách", "V plodech", "Pod listy"], answer: 1 }
                    ]
                },
                {
                    name: "Krytosemenné rostliny",
                    icon: "🌻",
                    popis: "Krytosemenné rostliny mají semena chráněná v semenících, která se vyvíjejí v plody. Mají květy. Jsou nejrozšířenější rostliny.",
                    test: [
                        { q: "Co je charakteristické pro krytosemenné rostliny?", options: ["Nemají květy", "Mají semena v semenících", "Nemají kořeny", "Rozmnožují se výtrusy"], answer: 1 },
                        { q: "Na kolik skupin se dělí krytosemenné?", options: ["1", "2 - dvouděložné a jednoděložné", "3", "4"], answer: 1 },
                        { q: "Příklad krytosemenné rostliny:", options: ["Smrk", "Jablko", "Borovice", "Jehličnan"], answer: 1 }
                    ]
                }
            ]
        };

        function initializeApp() {
            const grid = document.getElementById('temaGrid');
            grid.innerHTML = '';

            const strunatciHeading = document.createElement('h2');
            strunatciHeading.innerHTML = '🦴 STRUNATCI 🦴';
            grid.appendChild(strunatciHeading);

            data.strunatci.forEach((tema, index) => {
                const card = createCard(tema, `strunatci-${index}`);
                grid.appendChild(card);
            });

            const botanikaHeading = document.createElement('h2');
            botanikaHeading.innerHTML = '🌿 BOTANIKA 🌿';
            grid.appendChild(botanikaHeading);

            data.botanika.forEach((tema, index) => {
                const card = createCard(tema, `botanika-${index}`);
                grid.appendChild(card);
            });
        }

        function createCard(tema, id) {
            const card = document.createElement('div');
            card.className = 'tema-card';
            card.innerHTML = `
                <div class="icon">${tema.icon}</div>
                <h3>${tema.name}</h3>
                <button onclick="openModal('${id}')">Zjistit více a test</button>
            `;
            return card;
        }

        function openModal(id) {
            const parts = id.split('-');
            const section = parts[0];
            const index = parseInt(parts[1]);
            const tema = section === 'strunatci' ? data.strunatci[index] : data.botanika[index];

            let content = `
                <h2>${tema.name} ${tema.icon}</h2>
                <p><strong>Popis:</strong></p>
                <p>${tema.popis}</p>
                <hr>
                <h3>📝 Test - vyber správnou odpověď (A-B-C-D):</h3>
                <div class="test-container" id="testContainer"></div>
            `;

            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('modal').classList.add('show');

            const testContainer = document.getElementById('testContainer');
            testContainer.innerHTML = '';
            tema.test.forEach((q, qIndex) => {
                const testHtml = `
                    <div class="test-question">
                        <strong>Otázka ${qIndex + 1}:</strong> ${q.q}
                        <div class="test-options">
                            ${q.options.map((opt, oIndex) => `
                                <label>
                                    <input type="radio" name="q${qIndex}" value="${oIndex}" onchange="checkAnswer(${qIndex}, ${q.answer}, this)">
                                    ${String.fromCharCode(65 + oIndex)}) ${opt}
                                </label>
                            `).join('')}
                        </div>
                        <div id="feedback-${qIndex}"></div>
                    </div>
                `;
                testContainer.innerHTML += testHtml;
            });
        }

        function checkAnswer(qIndex, correct, element) {
            const feedbackDiv = document.getElementById(`feedback-${qIndex}`);
            if (parseInt(element.value) === correct) {
                feedbackDiv.innerHTML = '<span class="success">✅ Správně! Gratuluji!</span>';
            } else {
                feedbackDiv.innerHTML = '<span class="error">❌ Špatně! Zkus znovu.</span>';
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                modal.classList.remove('show');
            }
        }

        initializeApp();
    </script>
</body>
</html>
